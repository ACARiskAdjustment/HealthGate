# Zone 1 (Auth Plane) — Default deny all ingress and egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: healthgate-auth
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Zone 1 — Allow intra-namespace communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: healthgate-auth
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Zone 1 — Allow DNS resolution
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: healthgate-auth
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Zone 1 — Allow ingress from gateway namespace (Zone 2)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: healthgate-auth
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              zone: gateway
      ports:
        - protocol: TCP
          port: 8080
---
# Zone 1 — Allow ingress from ingress-nginx to BFF and Keycloak
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-nginx
  namespace: healthgate-auth
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - healthgate-bff
          - keycloak
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8080
---
# Zone 1 — Allow egress to external SAML IdPs and SMTP
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-egress
  namespace: healthgate-auth
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes:
    - Egress
  egress:
    # SAML IdP federation (external HTTPS)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              # Block egress to Zone 3 (PHI data plane) CIDR
              - 10.3.0.0/16
      ports:
        - protocol: TCP
          port: 443
    # SMTP for transactional email
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.3.0.0/16
      ports:
        - protocol: TCP
          port: 465
---
# Zone 1 — DENY all egress to Zone 3 (PHI data plane)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-phi-zone-egress
  namespace: healthgate-auth
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: zone
                operator: NotIn
                values:
                  - phi-data-plane
---
# Zone 1 — Allow egress to observability namespace (metrics, traces)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-observability-egress
  namespace: healthgate-auth
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: healthgate-observability
      ports:
        - protocol: TCP
          port: 4317  # OTLP gRPC
        - protocol: TCP
          port: 9090  # Prometheus
