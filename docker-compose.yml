services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_FEATURES: "preview"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
      - ./keycloak/themes/healthgate:/opt/keycloak/themes/healthgate
      - ./keycloak/providers:/opt/keycloak/providers
    ports:
      - "8080:8080"
    networks:
      - hg-auth-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 2 cat <&3 | grep -q 'UP'",
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - hg-auth-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: healthgate-clinician
      KEYCLOAK_CLIENT_ID: healthgate-dev
      KEYCLOAK_CLIENT_SECRET: ${KC_CLIENT_SECRET}
      NEXTAUTH_URL: http://localhost:3000
      COOKIE_ENCRYPTION_KEY: ${COOKIE_ENCRYPTION_KEY}
      NODE_ENV: development
    ports:
      - "3000:3000"
    networks:
      - hg-auth-net
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./public:/app/public

  # Optional: Kafka for audit log streaming (uncomment when needed)
  # kafka:
  #   image: bitnami/kafka:3.9
  #   environment:
  #     KAFKA_CFG_NODE_ID: 1
  #     KAFKA_CFG_PROCESS_ROLES: controller,broker
  #     KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
  #     KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
  #     KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
  #   ports:
  #     - "9092:9092"
  #   networks:
  #     - hg-auth-net

  # Optional: Dev-only mock gateway (uncomment when testing Zone 2→3)
  # gateway-mock:
  #   build:
  #     context: ./gateway
  #     dockerfile: Dockerfile.dev
  #   environment:
  #     JWKS_URL: http://keycloak:8080/realms/healthgate-clinician/protocol/openid-connect/certs
  #     UPSTREAM_URL: http://mock-app:9443
  #   ports:
  #     - "8443:8443"
  #   networks:
  #     - hg-auth-net

  # Optional: Dev-only mock downstream app
  # mock-app:
  #   image: nginx:alpine
  #   networks:
  #     - hg-auth-net

networks:
  hg-auth-net:
    driver: bridge

volumes:
  pg-data:
